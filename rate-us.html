<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেট আস - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; margin-bottom: 15px; font-size: 24px; }
        p { color: #7f8c8d; margin-bottom: 20px; }
        .stars { font-size: 35px; color: #f1c40f; margin-bottom: 25px; cursor: pointer; }
        .btn { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn:hover { background: #27ae60; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⭐ আমাদের রেট করুন (Rate Us)</h1>
        <p>আপনার অভিজ্ঞতা কেমন ছিল? আমাদের ৫ স্টার রেটিং দিয়ে উৎসাহিত করুন!</p>
        
        <div class="stars" onclick="alert('রেটিং দেওয়ার জন্য ধন্যবাদ!')">
            <span>☆</span><span>☆</span><span>☆</span><span>☆</span><span>☆</span>
        </div>

        <button class="btn" onclick="alert('প্লে স্টোরে রেটিং দেওয়ার জন্য আপনাকে রিডাইরেক্ট করা হচ্ছে...')">প্লে স্টোরে রেট করুন</button>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

</body>
</html>
