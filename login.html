<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - এস্টিক শপ</title>
    <style>
        /* নিখুঁত সবুজ ও নীল রঙের মিক্সড গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364, #11998e, #38ef7d);
            background-size: 400% 400%;
            animation: gradientAnimation 12s ease infinite;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* আধুনিক আল্ট্রা-প্রিমিয়াম গ্লাস লুক (ইউজার লগইন বক্স) */
        .login-container { 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 30px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            max-width: 380px; 
            box-sizing: border-box;
        }
        
        .login-container h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 25px; 
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .input-group { margin-bottom: 22px; }
        
        .input-group label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 8px; 
            color: #ffffff; 
            font-size: 14px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .input-group input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none; 
            color: #333333;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus { 
            background: #ffffff;
            border-color: #38ef7d; 
            box-shadow: 0 0 12px rgba(56, 239, 125, 0.5);
        }
        
        .btn-login { 
            background: linear-gradient(135deg, #11998e, #38ef7d); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
            transition: all 0.3s ease; 
        }
        
        .btn-login:hover { 
            background: linear-gradient(135deg, #0f837a, #2ec969); 
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.5);
            transform: translateY(-1px);
        }
        
        .register-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 13.5px; 
            color: #e0e0e0; 
        }
        .register-link a { 
            color: #38ef7d; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>লগইন করুন</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        
        <div class="input-group">
            <label>Email Account</label>
            <input type="email" id="loginEmail" placeholder="example@email.com">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="loginPhone" placeholder="017XXXXXXXX">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="আপনার পাসওয়ার্ডটি দিন" required>
        </div>

        <button type="submit" class="btn-login">লগইন করুন</button>

        <div class="register-link">
            নতুন অ্যাকাউন্ট তৈরি করবেন? <a href="register.html">রেজিস্ট্রেশন করুন</a>
        </div>
    </form>
</div>

<script>
    // সাধারণ ইউজারদের সাধারণ লগইন সিস্টেম (কোনো পরিবর্তন করা হয়নি)
    function handleLogin(event) {
        event.preventDefault(); 

        const inputEmail = document.getElementById('loginEmail').value.trim();
        const inputPhone = document.getElementById('loginPhone').value.trim();
        const inputPassword = document.getElementById('loginPassword').value.trim();

        if (!inputEmail || !inputPhone) {
            alert('দয়া করে আপনার ইমেইল এবং ফোন নাম্বার সঠিকভাবে দিন।');
            return;
        }

        const registeredEmail = localStorage.getItem('userEmail');
        const registeredPhone = localStorage.getItem('userPhone');
        const registeredPassword = localStorage.getItem('userPassword');

        if (!registeredEmail || !registeredPhone || !registeredPassword) {
            alert('আপনার কোনো অ্যাকাউন্ট খুঁজে পাওয়া যায়নি! দয়া করে আগে রেজিস্ট্রেশন করুন।');
            window.location.href = 'register.html';
            return;
        }

        if (inputEmail === registeredEmail && inputPhone === registeredPhone && inputPassword === registeredPassword) {
            alert('লগইন সফল হয়েছে! আপনাকে হোম পেজে নিয়ে যাওয়া হচ্ছে।');
            window.location.href = 'index.html'; 
        } else {
            alert('দুঃখিত! আপনার ইমেইল, ফোন নাম্বার অথবা পাসওয়ার্ড ভুল হয়েছে। আবার চেষ্টা করুন।');
        }
    }
</script>

</body>
</html>
