<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - এস্টিক শপ</title>
    <style>
        /* আপনার দেখানো স্ক্রিনের মতো নিখুঁত সবুজ ও নীল রঙের মিক্সড গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364, #11998e, #38ef7d);
            background-size: 400% 400%;
            animation: gradientAnimation 12s ease infinite;
            display: flex; 
            flex-direction: column; /* বাটন এবং ফর্ম লম্বালম্বি রাখার জন্য */
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- নতুন এডমিন বাটন ও ফর্মের স্টাইল --- */
        .admin-trigger-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-admin-trigger {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-admin-trigger:hover {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .admin-box {
            display: none; /* শুরুতে লুকানো থাকবে */
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* --- নতুন স্টাইল শেষ --- */

        /* স্ক্রিনের মতো আধুনিক আল্ট্রা-প্রিমিয়াম গ্লাস লুক (ব্যাকগ্রাউন্ডের সাথে ফিক্সড মিশে যাওয়া বক্স) */
        .login-container { 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 30px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            max-width: 380px; 
            box-sizing: border-box;
        }
        
        .login-container h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 30px; 
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .input-group { margin-bottom: 22px; }
        
        /* ইনপুট লেবেল স্টাইল */
        .input-group label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 8px; 
            color: #ffffff; 
            font-size: 14px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        /* গ্লাস লুকের সাথে ম্যাচিং ইনপুট বক্স */
        .input-group input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none; 
            color: #333333;
            transition: all 0.3s ease;
        }
        
        /* ইনপুট বক্সে ক্লিক করলে গ্লোয়িং ইফেক্ট */
        .input-group input:focus { 
            background: #ffffff;
            border-color: #38ef7d; 
            box-shadow: 0 0 12px rgba(56, 239, 125, 0.5);
        }

        /* রিড-অনলি বা লকড ইনপুট ফিল্ডের স্টাইল (যা পরিবর্তন করা যাবে না) */
        .input-group input[readonly] {
            background: rgba(240, 240, 240, 0.6);
            color: #555555;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* ব্যাকগ্রাউন্ড কালারের সাথে ম্যাচ করা প্রিমিয়াম সাইন-ইন বাটন */
        .btn-login { 
            background: linear-gradient(135deg, #11998e, #38ef7d); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
            transition: all 0.3s ease; 
        }
        
        .btn-login:hover { 
            background: linear-gradient(135deg, #0f837a, #2ec969); 
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.5);
            transform: translateY(-1px);
        }
        
        .btn-login:active {
            transform: translateY(1px);
        }
        
        /* রেজিস্ট্রেশন লিংক স্টাইল */
        .register-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 13.5px; 
            color: #e0e0e0; 
        }
        .register-link a { 
            color: #38ef7d; 
            text-decoration: none; 
            font-weight: bold; 
            transition: color 0.2s;
        }
        .register-link a:hover { 
            color: #ffffff;
            text-decoration: underline; 
        }
    </style>
</head>
<body>

<div class="admin-trigger-container">
    <button type="button" class="btn-admin-trigger" onclick="toggleAdminPanel()">Admin Panel</button>
</div>

<div class="login-container admin-box" id="adminBox">
    <h2>এডমিন লগইন</h2>
    <form onsubmit="handleAdminLogin(event)">
        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="adminPhone" value="01315531124" readonly>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="adminPassword" placeholder="এডমিন পাসওয়ার্ড দিন" required>
        </div>

        <button type="submit" class="btn-login" style="background: linear-gradient(135deg, #1f4068, #162447);">এডমিন লগইন</button>
    </form>
</div>

<div class="login-container">
    <h2>লগইন করুন</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        
        <div class="input-group">
            <label>Email Account</label>
            <input type="email" id="loginEmail" placeholder="example@email.com" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="loginPhone" placeholder="017XXXXXXXX" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="আপনার পাসওয়ার্ডটি দিন" required>
        </div>

        <button type="submit" class="btn-login">লগইন করুন</button>

        <div class="register-link">
            নতুন অ্যাকাউন্ট তৈরি করবেন? <a href="register.html">রেজিস্ট্রেশন করুন</a>
        </div>
    </form>
</div>

<script>
    // --- এডমিন সেটিংস ---
    const fixedAdminPhone = "01315531124"; // আপনার স্থায়ী নম্বরটি এখানে সেট করা হয়েছে
    const secretAdminPassword = "Admin@#Secure$2026"; // আপনার গোপন ও শক্তিশালী পাসওয়ার্ড

    // পেজ লোড হওয়ার সাথে সাথে ইনপুট বক্সে নম্বরটি সেট করার জন্য
    document.getElementById('adminPhone').value = fixedAdminPhone;

    // বাটন ক্লিক করলে এডমিন প্যানেল দেখানো বা লুকানোর ফাংশন
    function toggleAdminPanel() {
        const adminBox = document.getElementById('adminBox');
        if (adminBox.style.display === "block") {
            adminBox.style.display = "none";
        } else {
            adminBox.style.display = "block";
        }
    }

    // এডমিন লগইন যাচাই করার ফাংশন
    function handleAdminLogin(event) {
        event.preventDefault();
        const inputPassword = document.getElementById('adminPassword').value;

        // পাসওয়ার্ড হুবহু মিললে এডমিন ড্যাশবোর্ডে নিয়ে যাবে
        if (inputPassword === secretAdminPassword) {
            alert('এডমিন লগইন সফল হয়েছে! ড্যাশবোর্ডে নিয়ে যাওয়া হচ্ছে।');
            window.location.href = 'admin_dashboard.html'; // আপনার এডমিন প্যানেলের মেইন ফাইলটির নাম এখানে দিন
        } else {
            alert('দুঃখিত! ভুল পাসওয়ার্ড। আবার চেষ্টা করুন।');
        }
    }

    // আপনার পূর্বের মূল ইউজার লগইন ফাংশন (যা অপরিবর্তিত আছে)
    function handleLogin(event) {
        event.preventDefault(); 

        const inputEmail = document.getElementById('loginEmail').value.trim();
        const inputPhone = document.getElementById('loginPhone').value.trim();
        const inputPassword = document.getElementById('loginPassword').value;

        const registeredEmail = localStorage.getItem('userEmail');
        const registeredPhone = localStorage.getItem('userPhone');
        const registeredPassword = localStorage.getItem('userPassword');

        if (!registeredEmail || !registeredPhone || !registeredPassword) {
            alert('আপনার কোনো অ্যাকাউন্ট খুঁজে পাওয়া যায়নি! দয়া করে আগে রেজিস্ট্রেশন করুন।');
            window.location.href = 'register.html';
            return;
        }

        if (inputEmail === registeredEmail && inputPhone === registeredPhone && inputPassword === registeredPassword) {
            alert('লগইন সফল হয়েছে! আপনাকে হোম পেজে নিয়ে যাওয়া হচ্ছে।');
            window.location.href = 'index.html'; 
        } else {
            alert('দুঃখিত! আপনার ইমেইল, ফোন নাম্বার অথবা পাসওয়ার্ড ভুল হয়েছে। আবার চেষ্টা করুন।');
        }
    }
</script>

</body>
</html>
