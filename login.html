<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন - এস্টিক শপ</title>
    <style>
        /* নিখুঁত সবুজ ও নীল রঙের মিক্সড গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364, #11998e, #38ef7d);
            background-size: 400% 400%;
            animation: gradientAnimation 12s ease infinite;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* সার্চ বক্স বা মেনুর নিচে দৃশ্যমান অ্যাডমিন বাটন স্টাইল */
        .admin-menu-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .admin-menu-btn:hover {
            background: #38ef7d;
            color: #0f2027;
            border-color: #38ef7d;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }

        /* আধুনিক আল্ট্রা-প্রিমিয়াম গ্লাস লুক (ইউজার লগইন বক্স) */
        .login-container { 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 30px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            max-width: 380px; 
            box-sizing: border-box;
        }
        
        .login-container h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 25px; 
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .input-group { margin-bottom: 22px; }
        
        .input-group label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 8px; 
            color: #ffffff; 
            font-size: 14px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .input-group input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            outline: none; 
            color: #333333;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus { 
            background: #ffffff;
            border-color: #38ef7d; 
            box-shadow: 0 0 12px rgba(56, 239, 125, 0.5);
        }
        
        .btn-login { 
            background: linear-gradient(135deg, #11998e, #38ef7d); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
            transition: all 0.3s ease; 
        }
        
        .btn-login:hover { 
            background: linear-gradient(135deg, #0f837a, #2ec969); 
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.5);
            transform: translateY(-1px);
        }
        
        .register-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 13.5px; 
            color: #e0e0e0; 
        }
        .register-link a { 
            color: #38ef7d; 
            text-decoration: none; 
            font-weight: bold; 
        }

        /* --- অ্যাডমিন পপ-আপ (Modal) স্টাইল --- */
        .admin-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .admin-box {
            background: rgba(20, 30, 48, 0.98);
            border: 2px solid #38ef7d;
            padding: 35px 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 15px 35px rgba(56, 239, 125, 0.25);
            position: relative;
        }
        .admin-box h3 {
            color: #38ef7d;
            margin-top: 0;
            text-align: center;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .admin-box .close-btn {
            position: absolute;
            top: 12px; right: 18px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .admin-box .close-btn:hover {
            color: #ff4d4d;
        }
    </style>
</head>
<body>

<button class="admin-menu-btn" onclick="openAdminModal()">⚙️ Admin Panel</button>

<div class="login-container">
    <h2>লগইন করুন</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
        
        <div class="input-group">
            <label>Email Account</label>
            <input type="email" id="loginEmail" placeholder="example@email.com">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="loginPhone" placeholder="017XXXXXXXX">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="আপনার পাসওয়ার্ডটি দিন" required>
        </div>

        <button type="submit" class="btn-login">লগইন করুন</button>

        <div class="register-link">
            নতুন অ্যাকাউন্ট তৈরি করবেন? <a href="register.html">রেজিস্ট্রেশন করুন</a>
        </div>
    </form>
</div>

<div id="adminModal" class="admin-modal">
    <div class="admin-box">
        <span class="close-btn" onclick="closeAdminModal()">&times;</span>
        <h3>অ্যাডমিন লগইন</h3>
        
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="adminPhone" value="01315531124" readonly style="background: rgba(255,255,255,0.3); color: #fff; font-weight: bold; border-color: rgba(255,255,255,0.2);">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="adminPassword" placeholder="অ্যাডমিন পাসওয়ার্ড দিন" required>
        </div>

        <button type="button" class="btn-login" onclick="handleAdminLogin()">ভেরিফাই ও লগইন</button>
    </div>
</div>

<script>
    // পপ-আপ খোলার ফাংশন
    function openAdminModal() {
        document.getElementById('adminModal').style.display = 'flex';
    }

    // পপ-আপ বন্ধ করার ফাংশন
    function closeAdminModal() {
        document.getElementById('adminModal').style.display = 'none';
    }

    // অ্যাডমিন লগইন ভেরিফিকেশন
    function handleAdminLogin() {
        const inputPass = document.getElementById('adminPassword').value.trim();
        // আপনার দেওয়া অতিরিক্ত স্ট্রং পাসওয়ার্ড
        const secretPassword = "Admin#@2026!$"; 

        if (inputPass === secretPassword) {
            alert('অ্যাডমিন ভেরিফিকেশন সফল! প্যানেল ওপেন হচ্ছে...');
            window.location.href = 'admin.html'; // সরাসরি আপনার ফুল অ্যাডমিন পেজে নিয়ে যাবে
        } else {
            alert('দুঃখিত! ভুল পাসওয়ার্ড। আবার চেষ্টা করুন।');
        }
    }

    // সাধারণ ইউজারদের সাধারণ লগইন সিস্টেম (কোনো পরিবর্তন করা হয়নি)
    function handleLogin(event) {
        event.preventDefault(); 

        const inputEmail = document.getElementById('loginEmail').value.trim();
        const inputPhone = document.getElementById('loginPhone').value.trim();
        const inputPassword = document.getElementById('loginPassword').value.trim();

        if (!inputEmail || !inputPhone) {
            alert('দয়া করে আপনার ইমেইল এবং ফোন নাম্বার সঠিকভাবে দিন।');
            return;
        }

        const registeredEmail = localStorage.getItem('userEmail');
        const registeredPhone = localStorage.getItem('userPhone');
        const registeredPassword = localStorage.getItem('userPassword');

        if (!registeredEmail || !registeredPhone || !registeredPassword) {
            alert('আপনার কোনো অ্যাকাউন্ট খুঁজে পাওয়া যায়নি! দয়া করে আগে রেজিস্ট্রেশন করুন।');
            window.location.href = 'register.html';
            return;
        }

        if (inputEmail === registeredEmail && inputPhone === registeredPhone && inputPassword === registeredPassword) {
            alert('লগইন সফল হয়েছে! আপনাকে হোম পেজে নিয়ে যাওয়া হচ্ছে।');
            window.location.href = 'index.html'; 
        } else {
            alert('দুঃখিত! আপনার ইমেইল, ফোন নাম্বার অথবা পাসওয়ার্ড ভুল হয়েছে। আবার চেষ্টা করুন।');
        }
    }
</script>

</body>
</html>
