<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাইডার রিভিউ - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn { background: #ff9f43; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn:hover { background: #ee5253; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛵 রাইডার রিভিউ (Rider Review)</h1>
        
        <div class="form-group">
            <label>রাইডারের নাম বা আইডি</label>
            <input type="text" placeholder="যেমন: আরিয়ান বা #RIDER-55">
        </div>
        <div class="form-group">
            <label>রেটিং দিন</label>
            <select>
                <option value="5">⭐⭐⭐⭐⭐ (অসাধারণ)</option>
                <option value="4">⭐⭐⭐⭐ (ভালো)</option>
                <option value="3">⭐⭐⭐ (মোটামুটি)</option>
                <option value="2">⭐⭐ (খারাপ)</option>
                <option value="1">⭐ (খুবই খারাপ)</option>
            </select>
        </div>
        <div class="form-group">
            <label>রাইডারের ব্যবহার বা ডেলিভারি নিয়ে মন্তব্য</label>
            <textarea rows="3" placeholder="রাইডারের আচরণ কেমন ছিল লিখুন..."></textarea>
        </div>

        <button class="btn" onclick="alert('রাইডার রিভিউ সফলভাবে জমা হয়েছে!')">সাবমিট রিভিউ</button>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

</body>
</html>
