<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; font-size: 24px; }
        .faq-item { margin-bottom: 15px; background: #f8f9fa; padding: 12px; border-radius: 5px; }
        .question { font-weight: bold; color: #333; margin-bottom: 5px; font-size: 15px; }
        .answer { color: #666; font-size: 14px; line-height: 1.4; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>❓ সাধারণ জিজ্ঞাসা (FAQ)</h1>
        
        <div class="faq-item">
            <div class="question">প্রশ্ন: অর্ডার করার কতক্ষণ পর ডেলিভারি পাওয়া যায়?</div>
            <div class="answer">উত্তর: ঢাকা ও রাজশাহীর ভেতরে ২৪ থেকে ৪৮ ঘণ্টার মধ্যে এবং এর বাইরে ৩-৫ দিনের মধ্যে ডেলিভারি দেওয়া হয়।</div>
        </div>

        <div class="faq-item">
            <div class="question">প্রশ্ন: আমি কি ক্যাশ অন ডেলিভারি পাবো?</div>
            <div class="answer">উত্তর: হ্যাঁ, আপনি প্রোডাক্ট হাতে পেয়ে টাকা পরিশোধ করতে পারবেন।</div>
        </div>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

</body>
</html>
