<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রেজিস্ট্রেশন - এস্টিক শপ</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড এবং থিম */
        body { 
            font-family: Arial, sans-serif; 
            background: radial-gradient(circle at center, #0a192f, #020c1b); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-x: hidden;
        }

        /* ঘূর্ণায়মান আলোর অ্যানিমেশনের জন্য মেইন কন্টেইনার */
        .animated-border-box {
            position: relative;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            padding: 4px; /* লাইটের বর্ডারের থিকনেস */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.25);
        }

        /* ব্যাকগ্রাউন্ডে ঘূর্ণায়মান আলোর আভা (Neon Light Effect) */
        .animated-border-box::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                transparent, 
                #00f0ff, 
                #007bff, 
                transparent 30%, 
                transparent 50%, 
                #00f0ff, 
                #0056b3, 
                transparent 80%
            );
            animation: rotateLight 4s linear infinite;
        }

        /* ঘূর্ণন অ্যানিমেশন লজিক */
        @keyframes rotateLight {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* গ্লাসমরফিজম ফর্ম ডিজাইন */
        .register-container { 
            position: relative;
            background: rgba(10, 25, 47, 0.75); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 12px; 
            width: 100%;
            box-sizing: border-box;
            z-index: 2;
        }

        .register-container h2 { 
            text-align: center; 
            color: #00f0ff; 
            margin-bottom: 25px; 
            font-size: 26px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        
        .input-group { position: relative; margin-bottom: 20px; }
        
        .input-group label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #8892b0; 
            font-size: 14px; 
        }

        /* ইনপুট ফিল্ড স্টাইল */
        .input-group input { 
            width: 100%; 
            padding: 12px 35px 12px 12px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
            color: #fff;
            outline: none; 
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00f0ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* ইনপুট প্লেসহোল্ডার কালার */
        .input-group input::placeholder {
            color: #495670;
        }
        
        /* টিক মার্ক গ্লোয়িং কালার */
        .tick-mark { 
            position: absolute; 
            right: 12px; 
            top: 40px; 
            color: #00f0ff; 
            font-weight: bold; 
            font-size: 16px; 
            display: none; 
            text-shadow: 0 0 8px #00f0ff;
        }
        
        /* পাসওয়ার্ডের শর্তাবলী */
        .password-requirements { font-size: 12px; color: #8892b0; margin-top: 5px; padding-left: 15px; }
        .requirements-title { font-weight: bold; font-size: 12px; margin-top: 8px; color: #ccd6f6; }
        .req-item { color: #ff6b6b; transition: color 0.3s ease; }
        .req-item.valid { color: #00f0ff; text-shadow: 0 0 5px rgba(0, 240, 255, 0.2); }

        /* বাটন স্টাইলস */
        .btn-verify { 
            background: linear-gradient(45deg, #ff9800, #f57c00); 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 20px; 
            font-size: 15px; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.2);
        }

        .btn-verify:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        .btn-register { 
            background: linear-gradient(45deg, #0056b3, #007bff); 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: not-allowed; 
            font-size: 16px; 
            opacity: 0.4; 
            transition: all 0.3s ease;
        }

        .btn-register.active { 
            background: linear-gradient(45deg, #007bff, #00f0ff);
            cursor: pointer; 
            opacity: 1; 
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        .btn-register.active:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.5);
        }

        /* [নতুন] গুগল এবং ফেসবুক সোশ্যাল লগইন সেকশন */
        .social-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #495670;
            font-size: 12px;
            margin: 20px 0;
        }

        .social-divider::before, .social-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
        }

        .social-divider:not(:empty)::before { margin-right: .5em; }
        .social-divider:not(:empty)::after { margin-left: .5em; }

        .social-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .social-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .btn-google {
            background-color: #28a745; /* আপনার ছবি অনুযায়ী গ্রিন কালার */
        }

        .btn-facebook {
            background-color: #3b5998; /* ফেসবুক ব্লু কালার */
        }
        
        /* নিচের লিংক */
        .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #8892b0; }
        .login-link a { color: #00f0ff; text-decoration: none; font-weight: bold; transition: color 0.3s; }
        .login-link a:hover { color: #fff; text-shadow: 0 0 5px #00f0ff; }
    </style>
</head>
<body>

<div class="animated-border-box">
    <div class="register-container">
        <h2>নিবন্ধন করুন</h2>
        <form id="regForm" onsubmit="event.preventDefault();">
            
            <div class="input-group">
                <label>First Name (ইংরেজিতে)</label>
                <input type="text" id="firstName" placeholder="Enter first name" oninput="validateField('firstName')">
                <span class="tick-mark" id="firstNameTick">✓</span>
            </div>

            <div class="input-group">
                <label>Last Name (ইংরেজিতে)</label>
                <input type="text" id="lastName" placeholder="Enter last name" oninput="validateField('lastName')">
                <span class="tick-mark" id="lastNameTick">✓</span>
            </div>

            <div class="input-group">
                <label>Email Account</label>
                <input type="email" id="email" placeholder="example@email.com" oninput="validateEmail()">
                <span class="tick-mark" id="emailTick">✓</span>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="017XXXXXXXX" oninput="validatePhone()">
                <span class="tick-mark" id="phoneTick">✓</span>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="সর্বনিম্ন ৮ অক্ষরের পাসওয়ার্ড" oninput="validatePassword()">
                <span class="tick-mark" id="passwordTick">✓</span>
                <div class="requirements-title">পাসওয়ার্ডের শর্তাবলী:</div>
                <ul class="password-requirements">
                    <li id="reqLength" class="req-item">সর্বনিম্ন ৮টি অক্ষর হতে হবে</li>
                    <li id="reqUpper" class="req-item">কমপক্ষে ১টি বড় হাতের অক্ষর (A-Z)</li>
                    <li id="reqLower" class="req-item">কমপক্ষে ১টি ছোট হাতের অক্ষর (a-z)</li>
                    <li id="reqNumber" class="req-item">কমপক্ষে ১টি সংখ্যা (0-9)</li>
                    <li id="reqSpecial" class="req-item">কমপক্ষে ১টি চিহ্ন (?, !, @, #, $, ইত্যাদি)</li>
                </ul>
            </div>

            <button type="button" class="btn-verify" id="verifyBtn" onclick="verifyData()">যাচাই (Verify) করুন</button>
            
            <div class="social-divider">or sign up with</div>
            <div class="social-group">
                <button type="button" class="social-btn btn-google">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12.24 10.285V13.4h6.887c-.648 2.41-2.519 4.113-5.136 4.113-3.44 0-6.23-2.79-6.23-6.23s2.79-6.23 6.23-6.23c1.493 0 2.86.526 3.935 1.403l2.39-2.39C18.621 2.502 15.615 1.5 12.24 1.5 6.42 1.5 1.7 6.22 1.7 12s4.72 10.5 10.54 10.5c5.78 0 10.23-4.06 10.23-10.4 0-.565-.053-1.115-.15-1.615H12.24z"/></svg>
                    Continue with Google
                </button>
                <button type="button" class="social-btn btn-facebook">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>
                    Continue with Facebook
                </button>
            </div>

            <button type="submit" class="btn-register" id="registerBtn" disabled onclick="submitRegistration()">রেজিস্ট্রি করুন</button>

            <div class="login-link">
                ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a>
            </div>
        </form>
    </div>
</div>

<script>
    function validateField(id) {
        const input = document.getElementById(id);
        const tick = document.getElementById(id + 'Tick');
        if (input.value.trim().length >= 2) {
            tick.style.display = 'block';
            return true;
        } else {
            tick.style.display = 'none';
            return false;
        }
    }

    function validateEmail() {
        const email = document.getElementById('email').value;
        const tick = document.getElementById('emailTick');
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (emailPattern.test(email)) {
            tick.style.display = 'block';
            return true;
        } else {
            tick.style.display = 'none';
            return false;
        }
    }

    function validatePhone() {
        const phone = document.getElementById('phone').value;
        const tick = document.getElementById('phoneTick');
        const phonePattern = /^(01)[3-9]\d{8}$/;
        
        if (phonePattern.test(phone)) {
            tick.style.display = 'block';
            return true;
        } else {
            tick.style.display = 'none';
            return false;
        }
    }

    function validatePassword() {
        const password = document.getElementById('password').value;
        const tick = document.getElementById('passwordTick');
        
        const hasLength = password.length >= 8;
        const hasUpper = /[A-Z]/.test(password);
        const hasLower = /[a-z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSpecial = /[!@#$%^&*(),.?":{}|<>_]/.test(password);

        document.getElementById('reqLength').className = hasLength ? 'req-item valid' : 'req-item';
        document.getElementById('reqUpper').className = hasUpper ? 'req-item valid' : 'req-item';
        document.getElementById('reqLower').className = hasLower ? 'req-item valid' : 'req-item';
        document.getElementById('reqNumber').className = hasNumber ? 'req-item valid' : 'req-item';
        document.getElementById('reqSpecial').className = hasSpecial ? 'req-item valid' : 'req-item';

        if (hasLength && hasUpper && hasLower && hasNumber && hasSpecial) {
            tick.style.display = 'block';
            return true;
        } else {
            tick.style.display = 'none';
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('registerBtn').classList.remove('active');
            return false;
        }
    }

    function verifyData() {
        const isFirstValid = validateField('firstName');
        const isLastValid = validateField('lastName');
        const isEmailValid = validateEmail();
        const isPhoneValid = validatePhone();
        const isPassValid = validatePassword();

        if (isFirstValid && isLastValid && isEmailValid && isPhoneValid && isPassValid) {
            alert('আপনার সকল তথ্য সঠিক আছে! এখন নিচের "রেজিস্ট্রি করুন" বোতামে ক্লিক করুন।');
            const regBtn = document.getElementById('registerBtn');
            regBtn.disabled = false;
            regBtn.classList.add('active');
        } else {
            alert('অনুগ্রহ করে ফরমের সব তথ্য সঠিকভাবে পূরণ করুন (নীল সংকেতগুলো খেয়াল করুন)।');
        }
    }

    function submitRegistration() {
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        localStorage.setItem('userEmail', email);
        localStorage.setItem('userPhone', phone);
        localStorage.setItem('userPassword', password);

        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loggedInUser', email);

        alert('অভিনন্দন! আপনার রেজিস্ট্রেশন সফলভাবে সম্পন্ন হয়েছে। আপনাকে সরাসরি হোম পেজে নিয়ে যাওয়া হচ্ছে।');
        window.location.href = 'index.html'; 
    }
</script>

</body>
</html>
