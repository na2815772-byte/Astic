<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Widget</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* মূল কন্টেইনার: ইনডেক্স পেজের সাথে মিল রেখে বাম পাশে পাশাপাশি দেখানোর জন্য আপডেট করা হয়েছে */
        .premium-chat-container {
            position: relative;
            z-index: 999;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            flex-direction: row-reverse; /* এর ফলে অপশনগুলো মেইন বাটনের বাম পাশে আসবে */
            gap: 10px;
            float: right; /* ডান কোণায় রাখার জন্য */
            margin-right: 20px; 
            margin-top: 15px;  
        }

        /* মেইন চ্যাট বাটন (ফেসবুক মেসেঞ্জার স্টাইল গ্রেডিয়েন্ট ও প্রিমিয়াম গ্লো ইফেক্ট) */
        .chat-main-btn {
            background: linear-gradient(135deg, #006AFF, #00B2FE, #00FFF0);
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
            color: white;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 106, 255, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            flex-shrink: 0;
        }

        /* বাটনের ওপর মাউস নিলে প্রিমিয়াম ভিজ্যুয়াল ইফেক্ট */
        .chat-main-btn:hover {
            transform: scale(1.08) rotate(15deg);
            box-shadow: 0 12px 30px rgba(0, 106, 255, 0.5);
        }

        /* ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট动画 */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* অপশন মেনু (বাম পাশে পাশাপাশি ভেসে ওঠার প্রিমিয়াম ডিজাইন) */
        .chat-options {
            display: flex;
            flex-direction: row; /* বাটনগুলো পাশাপাশি রাখার জন্য */
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(15px) scale(0.8); /* বাম দিকে অ্যানিমেশনের জন্য */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* বাটন ক্লিক করলে অপশনগুলো যেভাবে ভেসে উঠবে (Active Class) */
        .chat-options.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0) scale(1);
        }

        /* মেসেঞ্জার এবং হোয়াটসঅ্যাপ প্রতিটির আলাদা প্রিমিয়াম বাটন স্টাইল */
        .chat-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        /* ডিরেক্ট মেসেঞ্জার বাটন কালার ও গ্লো */
        .messenger-btn {
            background: linear-gradient(135deg, #1877F2, #00FFF0);
        }
        .messenger-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.4);
        }

        /* ডিরেক্ট হোয়াটসঅ্যাপ বাটন কালার ও গ্লো */
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }
        .whatsapp-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>

    <div class="premium-chat-container">
        
        <div class="chat-options" id="chatOptions">
            <!-- এখানে onclick ইভেন্টে আপনার লগইন ভ্যালিডেশন এবং ইংরেজি সতর্কবার্তা যুক্ত করা হয়েছে -->
            <a href="https://m.me/NELOY.2k.25" target="_blank" class="chat-item messenger-btn" onclick="checkLoginAndRedirect(event, this.href)">
                <i class="fab fa-facebook-messenger"></i>
            </a>
            <a href="https://wa.me/8801315531124" target="_blank" class="chat-item whatsapp-btn" onclick="checkLoginAndRedirect(event, this.href)">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>

        <button class="chat-main-btn" id="mainChatBtn">
            <i class="fab fa-facebook-messenger"></i>
        </button>

    </div>

    <script>
        const mainBtn = document.getElementById('mainChatBtn');
        const chatOptions = document.getElementById('chatOptions');

        // মেইন বাটন ক্লিক ইভেন্ট
        mainBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // ক্লিক ইভেন্ট প্রপাগেশন বন্ধ করার জন্য
            chatOptions.classList.toggle('active');
            
            const icon = mainBtn.querySelector('i');
            if(chatOptions.classList.contains('active')) {
                icon.className = 'fas fa-xmark';
                mainBtn.style.transform = 'scale(0.95)';
            } else {
                icon.className = 'fab fa-facebook-messenger';
                mainBtn.style.transform = '';
            }
        });

        // উইজেটের বাইরে ক্লিক করলে মেনু স্বয়ংক্রিয়ভাবে বন্ধ হওয়া এবং আইকন রিসেট বাগ ফিক্স
        document.addEventListener('click', (e) => {
            if (!mainBtn.contains(e.target) && !chatOptions.contains(e.target)) {
                chatOptions.classList.remove('active');
                mainBtn.querySelector('i').className = 'fab fa-facebook-messenger';
                mainBtn.style.transform = '';
            }
        });

        // লগইন চেক এবং ইংরেজি সতর্কবার্তা (⚠️ WARNING) ফাংশন
        function checkLoginAndRedirect(event, url) {
            // ইনডেক্স ফাইলের সাথে মিল রেখে লোকাল স্টোরেজ চেক করা হচ্ছে
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if (!isLoggedIn) {
                event.preventDefault(); // লিংকের ডিফল্ট অ্যাকশন বা রিডাইরেক্ট বন্ধ করবে
                alert("⚠️ WARNING!\n\nPlease complete your registration first, then return to the home page.");
            }
        }
    </script>
</body>
</html>
