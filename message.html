<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Widget</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* মূল কন্টেইনার: এটিকে প্রোডাক্ট সেকশনের ঠিক ওপরের সাদা অংশের ডান কোণায় পজিশন করা হয়েছে */
        .premium-chat-container {
            position: relative;
            display: inline-block;
            float: right; /* ডান কোণায় নেওয়ার জন্য */
            margin-right: 20px; /* ডান পাশ থেকে কিছুটা জায়গা */
            margin-top: 15px;  /* ওপরের সাদা অংশে অ্যাডজাস্ট করার জন্য */
            z-index: 999;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* মেইন চ্যাট বাটন (ফেসবুক মেসেঞ্জার স্টাইল গ্রেডিয়েন্ট ও প্রিমিয়াম গ্লো ইফেক্ট) */
        .chat-main-btn {
            background: linear-gradient(135deg, #006AFF, #00B2FE, #00FFF0);
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 106, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        /* বাটনের ওপর মাউস নিলে প্রিমিয়াম ভিজ্যুয়াল ইফেক্ট */
        .chat-main-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 12px 30px rgba(0, 106, 255, 0.6);
        }

        /* ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট অ্যানিমেশন */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* অপশন মেনু (শুরুতে লুকানো থাকবে) */
        .chat-options {
            position: absolute;
            bottom: 75px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* বাটন ক্লিক করলে অপশনগুলো যেভাবে ভেসে উঠবে (Active Class) */
        .chat-options.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* মেসেঞ্জার এবং হোয়াটসঅ্যাপ প্রতিটির আলাদা প্রিমিয়াম বাটন স্টাইল */
        .chat-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: relative;
        }

        /* হোভার করলে হালকা টেক্সট পপ-আপ (টুলটিপ) */
        .chat-item::before {
            content: attr(data-tooltip);
            position: absolute;
            right: 65px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .chat-item:hover::before {
            opacity: 1;
            visibility: visible;
        }

        /* ডিরেক্ট মেসেঞ্জার বাটন কালার ও গ্লো */
        .messenger-btn {
            background: linear-gradient(135deg, #1877F2, #00FFF0);
        }
        .messenger-btn:hover {
            transform: translateX(-5px) scale(1.05);
            box-shadow: 0 8px 20px rgba(24, 119, 242, 0.5);
        }

        /* ডিরেক্ট হোয়াটসঅ্যাপ বাটন কালার ও গ্লো */
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }
        .whatsapp-btn:hover {
            transform: translateX(-5px) scale(1.05);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.5);
        }
    </style>
</head>
<body>

    <div class="premium-chat-container">
        
        <div class="chat-options" id="chatOptions">
            <a href="https://m.me/NELOY.2k.25" target="_blank" class="chat-item messenger-btn" data-tooltip="Messenger">
                <i class="fab fa-facebook-messenger"></i>
            </a>
            <a href="https://wa.me/8801315531124" target="_blank" class="chat-item whatsapp-btn" data-tooltip="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>

        <button class="chat-main-btn" id="mainChatBtn">
            <i class="fab fa-facebook-messenger"></i>
        </button>

    </div>

    <script>
        const mainBtn = document.getElementById('mainChatBtn');
        const chatOptions = document.getElementById('chatOptions');

        mainBtn.addEventListener('click', () => {
            chatOptions.classList.toggle('active');
            
            // ক্লিক করলে মেইন আইকনটি মেসেঞ্জার থেকে ক্লোজ (X) চিহ্নে অ্যানিমেট হবে
            const icon = mainBtn.querySelector('i');
            if(chatOptions.classList.contains('active')) {
                icon.classList.remove('fab', 'fa-facebook-messenger');
                icon.classList.add('fas', 'fa-xmark');
                mainBtn.style.transform = 'scale(0.95)';
            } else {
                icon.classList.remove('fas', 'fa-xmark');
                icon.classList.add('fab', 'fa-facebook-messenger');
                mainBtn.style.transform = '';
            }
        });

        // উইজেটের বাইরে ক্লিক করলে মেনু স্বয়ংক্রিয়ভাবে বন্ধ হয়ে যাবে
        document.addEventListener('click', (e) => {
            if (!mainBtn.contains(e.target) && !chatOptions.contains(e.target)) {
                chatOptions.classList.remove('active');
                const icon = mainBtn.querySelector('i');
                icon.classList.remove('fas', 'fa-xmark');
                icon.classList.add('fab', 'fa-facebook-messenger');
            }
        });
    </script>
</body>
</html>
