<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কেরিয়ার - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 15px; font-size: 24px; }
        p { color: #7f8c8d; text-align: center; margin-bottom: 25px; }
        .job-card { border: 1px solid #ddd; padding: 15px; border-radius: 6px; margin-bottom: 15px; background: #fff; }
        .job-title { font-weight: bold; color: #333; font-size: 16px; margin-bottom: 5px; }
        .job-meta { font-size: 13px; color: #e67e22; margin-bottom: 10px; }
        .btn { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn:hover { background: #2980b9; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>💼 আমাদের সাথে কাজ করুন (Career)</h1>
        <p>এস্টিক টিম-এ আপনাকে স্বাগতম। নিচে আমাদের বর্তমান খালি পদগুলো দেওয়া হলো:</p>
        
        <div class="job-card">
            <div class="job-title">১. ডেলিভারি রাইডার (রাজশাহী ও ঢাকা)</div>
            <div class="job-meta">ফুল টাইম / পার্ট টাইম | বেতন: আলোচনা সাপেক্ষে</div>
            <button class="btn" onclick="alert('আপনার সিভি সিলেকশনের জন্য আমাদের ইমেইলে পাঠান!')">আবেদন করুন</button>
        </div>

        <div class="job-card">
            <div class="job-title">২. কাস্টমার সাপোর্ট এক্সিকিউটিভ</div>
            <div class="job-meta">রিমোট (বাসা থেকে কাজ) | যোগ্যতা: এইচএসসি/ডিপ্লোমা</div>
            <button class="btn" onclick="alert('আপনার আবেদনটি গ্রহণ করা হয়েছে!')">আবেদন করুন</button>
        </div>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

</body>
</html>
