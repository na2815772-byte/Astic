<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Inbox - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --danger-color: #ef4444;
            --bg-color: #f8fafc;
            --sidebar-color: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--sidebar-color); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 24px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--primary-color); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .nav-item a { display: flex; align-items: center; padding: 12px; color: var(--text-muted); text-decoration: none; border-radius: 6px; font-weight: 500; font-size: 14px; gap: 12px; }
        .nav-item.active a { background-color: var(--bg-color); color: var(--primary-color); }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { height: 70px; background-color: #ffffff; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 30px; }
        .header h2 { font-size: 18px; font-weight: 600; }

        /* Content Container */
        .inbox-container { flex: 1; padding: 30px; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; }

        /* অর্ডার কার্ড */
        .order-card { background-color: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); overflow: hidden; display: none; }
        .product-img-box { width: 100%; height: 240px; background-color: #f1f5f9; border-bottom: 1px solid var(--border-color); }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .order-info { padding: 25px; }
        .info-row { margin-bottom: 16px; }
        .info-row label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
        .info-row p { font-size: 14px; color: var(--text-main); font-weight: 500; }
        .address-text { background-color: var(--bg-color); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); line-height: 1.5; }

        /* ক্যান্সেল বাটন */
        .cancel-btn { width: 100%; background-color: var(--danger-color); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .cancel-btn:hover { background-color: #dc2626; }

        /* বার্তা নেই বক্স */
        .no-message-box { text-align: center; margin-top: 100px; display: none; }
        .no-message-box i { font-size: 60px; color: #cbd5e1; margin-bottom: 15px; }
        .no-message-box h3 { font-size: 18px; color: var(--text-main); font-weight: 600; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 15px 5px; align-items: center; }
            .logo span, .nav-item span { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>OrderInbox</span>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active">
                <a href="#">
                    <i class="fa-solid fa-inbox"></i>
                    <span>ইনবক্স</span>
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>ইনবক্স ড্যাশবোর্ড</h2>
        </header>

        <div class="inbox-container">
            
            <div class="order-card" id="orderCard">
                <div class="product-img-box">
                    <img id="productImg" src="" alt="Product">
                </div>
                <div class="order-info">
                    <div class="info-row">
                        <label>অর্ডার আইডি (Order ID)</label>
                        <p id="orderId" style="color: var(--primary-color); font-weight: 700;"></p>
                    </div>
                    <div class="info-row">
                        <label>কাস্টমারের নাম</label>
                        <p id="customerName"></p>
                    </div>
                    <div class="info-row">
                        <label>মোবাইল নম্বর</label>
                        <p id="customerPhone"></p>
                    </div>
                    <div class="info-row">
                        <label>প্রোডাক্টের বিবরণ</label>
                        <p id="productDetails"></p>
                    </div>
                    <div class="info-row">
                        <label>ডেলিভারি ঠিকানা (Address)</label>
                        <p id="deliveryAddress" class="address-text"></p>
                    </div>
                    
                    <button class="cancel-btn" id="cancelOrderBtn">
                        <i class="fa-regular fa-trash-can"></i>
                        অর্ডার ক্যান্সেল করুন
                    </button>
                </div>
            </div>

            <div class="no-message-box" id="noMessageBox">
                <i class="fa-regular fa-envelope-open"></i>
                <h3>আপনার কোন বার্তা নেই</h3>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderCard = document.getElementById('orderCard');
            const noMessageBox = document.getElementById('noMessageBox');
            const cancelOrderBtn = document.getElementById('cancelOrderBtn');

            // লাইভ রেন্ডার লজিক (index.html থেকে আসা ডাটা রিড করা)
            function checkLiveInbox() {
                const savedOrder = localStorage.getItem('userOrder');

                if (savedOrder) {
                    const currentOrder = JSON.parse(savedOrder);

                    // ডাইনামিকালি ফর্ম থেকে আসা ডাটা এবং ছবি কার্ডে সেট করা হচ্ছে
                    document.getElementById('productImg').src = currentOrder.productImg;
                    document.getElementById('orderId').textContent = currentOrder.id;
                    document.getElementById('customerName').textContent = currentOrder.name;
                    document.getElementById('customerPhone').textContent = currentOrder.phone;
                    document.getElementById('productDetails').textContent = currentOrder.productTitle;
                    document.getElementById('deliveryAddress').textContent = currentOrder.address;

                    orderCard.style.display = 'block';
                    noMessageBox.style.display = 'none';
                } else {
                    // কোনো ডাটা না থাকলে আপনার কথামতো এই মেসেজ দেখাবে
                    orderCard.style.display = 'none';
                    noMessageBox.style.display = 'block';
                }
            }

            // শুরুতে ডাটা চেক করা
            checkLiveInbox();

            // প্রতি সেকেন্ডে মেমোরি চেক করা (যাতে অন্য ট্যাবে অর্ডার করলে এই ট্যাবে অটো আপডেট হয়)
            setInterval(checkLiveInbox, 1000);

            // অর্ডার ক্যান্সেল লজিক
            cancelOrderBtn.addEventListener('click', () => {
                let confirmCancel = confirm("আপনি কি নিশ্চিত যে এই অর্ডারটি ক্যান্সেল করতে চান?");
                if (confirmCancel) {
                    localStorage.removeItem('userOrder'); // মেমোরি খালি করা হলো
                    alert("অর্ডারটি সফলভাবে ক্যান্সেল করা হয়েছে!");
                    checkLiveInbox();
                }
            });
        });
    </script>
</body>
</html>
