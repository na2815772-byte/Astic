<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আপনার ইনবক্স - অর্ডার ডিটেইলস</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --background: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Premium Glow Effect on Background */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(79, 70, 229, 0.3);
            border-radius: 50%;
            top: 10%;
            left: 15%;
            filter: blur(100px);
            z-index: -1;
        }

        /* Container Styling with Glassmorphism */
        .inbox-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Header Premium Design */
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .header i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Product Card Styling */
        .product-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: scale(1.02);
        }

        /* Dynamic Product Image with Glow */
        .product-img-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info h3 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
        }

        .product-info .price {
            font-size: 16px;
            color: #a5b4fc;
            font-weight: 600;
        }

        /* Customer Details Section */
        .details-section {
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            margin-bottom: 25px;
        }

        .details-title {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .detail-label {
            color: #94a3b8;
        }

        .detail-value {
            color: #e2e8f0;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
        }

        /* Delivery Status Banner (Premium Visual Effect) */
        .delivery-status {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(5, 150, 105, 0.05) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .delivery-status::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            100% { left: 150%; }
        }

        .status-text {
            color: #34d399;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-text i {
            font-size: 18px;
            animation: bounce 1s infinite alternate;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }
    </style>
</head>
<body>

    <div class="inbox-container">
        <div class="header">
            <i class="fa-solid fa-boxes-packing"></i>
            <h1>আপনার অর্ডার ইনবক্স</h1>
        </div>

        <div class="product-card">
            <div class="product-img-wrapper">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Product Image" class="product-img">
            </div>
            <div class="product-info">
                <h3>প্রিমিয়াম লাক্সারি ওয়াচ</h3>
                <div class="price">৳ ৪০০.০০</div>
            </div>
        </div>

        <div class="details-section">
            <div class="details-title">
                <i class="fa-solid fa-receipt"></i> ডেলিভারি ও কাস্টমার ডিটেইলস
            </div>
            
            <div class="detail-item">
                <span class="detail-label">গ্রাহকের নাম:</span>
                <span class="detail-value" id="cust-name">মোঃ নিলয় হোসেন</span>
            </div>
            
            <div class="detail-item">
                <span class="detail-label">মোবাইল নম্বর:</span>
                <span class="detail-value" id="cust-phone">017XXXXXXXX</span>
            </div>
            
            <div class="detail-item">
                <span class="detail-label">ডেলিভারি ঠিকানা:</span>
                <span class="detail-value" id="cust-address">বাগমারা, রাজশাহী, বাংলাদেশ</span>
            </div>

            <div class="detail-item">
                <span class="detail-label">মোট মূল্য:</span>
                <span class="detail-value" style="color: #6366f1;">৳ ৪০০ (ক্যাশ অন ডেলিভারি)</span>
            </div>
        </div>

        <div class="delivery-status">
            <div class="status-text">
                <i class="fa-solid fa-circle-check"></i>
                আপনার কাঙ্ক্ষিত প্রোডাক্টটি ইতিমধ্যে ডেলিভারি হয়েছে।
            </div>
        </div>
    </div>

    <script>
        // local storage থেকে ডাইনামিক ডেটা লোড করার লজিক (প্রয়োজনীয় ক্ষেত্রে)
        document.addEventListener("DOMContentLoaded", function() {
            const savedName = localStorage.getItem("order_name");
            const savedPhone = localStorage.getItem("order_phone");
            const savedAddress = localStorage.getItem("order_address");

            if(savedName) document.getElementById("cust-name").innerText = savedName;
            if(savedPhone) document.getElementById("cust-phone").innerText = savedPhone;
            if(savedAddress) document.getElementById("cust-address").innerText = savedAddress;
        });
    </script>
</body>
</html>
