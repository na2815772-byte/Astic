<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নোটিফিকেশন - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; font-size: 24px; }
        .noti-card { padding: 15px; border-left: 4px solid #3498db; background: #f8f9fa; margin-bottom: 12px; border-radius: 0 6px 6px 0; }
        .noti-card.promo { border-left-color: #e74c3c; }
        .noti-title { font-weight: bold; color: #333; margin-bottom: 5px; font-size: 16px; }
        .noti-text { color: #666; font-size: 14px; line-height: 1.4; }
        .noti-time { font-size: 11px; color: #999; margin-top: 5px; text-align: right; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔔 নোটিফিকেশন সেন্টার</h1>
        
        <div class="noti-list">
            <div class="noti-card promo">
                <div class="noti-title">🎉 ধামাকা অফার!</div>
                <div class="noti-text">আজকের জন্য যেকোনো কেনাকাটায় ফ্রি ডেলিভারি! এখনই লুফে নিন আপনার পছন্দের প্রোডাক্ট।</div>
                <div class="noti-time">১০ মিনিট আগে</div>
            </div>

            <div class="noti-card">
                <div class="noti-title">🛒 অর্ডার আপডেট</div>
                <div class="noti-text">আপনার ঘড়ির অর্ডারটি সফলভাবে প্রসেস করা হয়েছে এবং কুরিয়ারে পাঠানো হয়েছে।</div>
                <div class="noti-time">২ ঘণ্টা আগে</div>
            </div>
        </div>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

</body>
</html>
