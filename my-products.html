<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাই প্রোডাক্টস - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; overflow-x: hidden; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; font-size: 24px; }
        
        /* ফিল্টার বাটনের স্টাইল */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-btn {
            background: #ecf0f1;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }
        .filter-btn.active {
            background: #3498db;
            color: white;
        }

        /* প্রোডাক্ট আইটেম স্টাইল */
        .product-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            cursor: pointer;
            transition: background 0.3s, transform 0.5s, opacity 0.5s;
            position: relative;
            border-radius: 6px;
        }
        .product-item:hover { background-color: #fcfcfc; }
        .product-item:last-child { border-bottom: none; }
        
        .prod-details h3 { color: #333; font-size: 18px; margin-bottom: 5px; }
        .prod-details p { color: #7f8c8d; font-size: 14px; }
        .status { background: #2ecc71; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; transition: all 0.3s; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }

        /* ডিলিট বাটন স্টাইল */
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;
        }
        
        .product-item.show-delete .status {
            display: none;
        }
        .product-item.show-delete .delete-btn {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .product-item.fade-out {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        /* আলোর ক্র্যাশ (Particle) স্টাইল */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, #ffea00, #ff5722);
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff5722;
            animation: flash-crash 0.6s ease-out forwards;
            z-index: 9999;
        }

        @keyframes flash-crash {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--mx), var(--my)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 আমার প্রোডাক্টসমূহ (My Products)</h1>
        
        <div class="filter-container">
            <button class="filter-btn active" id="btnToday" onclick="filterProducts('today')">আজকের নতুন প্রোডাক্ট</button>
            <button class="filter-btn" id="btnAll" onclick="filterProducts('all')">সব প্রোডাক্ট</button>
        </div>
        
        <div class="product-list" id="myProductList">
            </div>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

    <script>
        // ১. ডাটাবেজ বা ফাইল লজিক (এখানে প্রতিটি প্রোডাক্টের একটি নির্দিষ্ট তারিখ বা 'date' দেওয়া আছে)
        // টেস্ট করার জন্য প্রথম প্রোডাক্টটির তারিখ আজকের বর্তমান তারিখ (২০২৬-০৬-২৭) দেওয়া হলো
        const myOrderedProducts = [
            { id: "#AST-9874", name: "প্রিমিয়াম টি-শার্ট", status: "ডেলিভারড", statusBg: "#2ecc71", date: "2026-06-27" },
            { id: "#AST-9852", name: "স্মার্ট এনালগ ঘড়ি", status: "চলতি পথে", statusBg: "#f1c40f", date: "2026-06-25" } // এটি আগের দিনের
        ];

        // ২. স্ক্রিনে প্রোডাক্ট দেখানোর মূল ফাংশন
        function renderOrderedProducts(productsToDisplay) {
            const listContainer = document.getElementById('myProductList');
            listContainer.innerHTML = '';

            if (productsToDisplay.length === 0) {
                listContainer.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding: 20px;">এই তালিকায় কোনো প্রোডাক্ট নেই।</p>';
                return;
            }

            productsToDisplay.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product-item';
                item.setAttribute('onclick', 'toggleDelete(this, event)');
                
                item.innerHTML = `
                    <div class="prod-details">
                        <h3>${p.name}</h3>
                        <p>অর্ডার আইডি: ${p.id}</p>
                    </div>
                    <span class="status" style="background: ${p.statusBg};">${p.status}</span>
                    <button class="delete-btn" onclick="deleteProduct(this, event)">ডিলিট করুন</button>
                `;
                listContainer.appendChild(item);
            });
        }

        // ৩. মেইন ফিল্টারিং লজিক (আজকের বনাম সব প্রোডাক্ট)
        function filterProducts(type) {
            // বাটনগুলোর অ্যাক্টিভ কালার পরিবর্তন
            document.getElementById('btnToday').classList.toggle('active', type === 'today');
            document.getElementById('btnAll').classList.toggle('active', type === 'all');

            if (type === 'all') {
                renderOrderedProducts(myOrderedProducts);
            } else {
                // আজকের লাইভ তারিখ বের করার লজিক (YYYY-MM-DD ফরম্যাটে)
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const formattedToday = `${yyyy}-${mm}-${dd}`;

                // লজিক ম্যাচিং: শুধু আজকের তারিখের প্রোডাক্টগুলো ফিল্টার হবে
                const todayProducts = myOrderedProducts.filter(p => p.date === formattedToday);
                renderOrderedProducts(todayProducts);
            }
        }

        // ৪. ডিলিট বাটন টগল করার ফাংশন
        function toggleDelete(element, event) {
            if (event.target.classList.contains('delete-btn')) return;

            document.querySelectorAll('.product-item').forEach(item => {
                if (item !== element) item.classList.remove('show-delete');
            });

            element.classList.toggle('show-delete');
        }

        // ৫. আলোর ক্র্যাশ ইফেক্ট এবং ডিলিট করার লজিক
        function deleteProduct(button, event) {
            event.stopPropagation();
            const productItem = button.closest('.product-item');
            
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 30; i++) {
                createParticle(centerX, centerY);
            }

            productItem.classList.add('fade-out');
            
            setTimeout(() => {
                // মেইন অ্যারে থেকে ডাটা মুছে ফেলা (অর্ডার আইডি ম্যাচ করে)
                const orderId = productItem.querySelector('.prod-details p').innerText.replace('অর্ডার আইডি: ', '');
                const index = myOrderedProducts.findIndex(p => p.id === orderId);
                if (index !== -1) myOrderedProducts.splice(index, 1);
                
                productItem.remove();
            }, 500);
        }

        // আলোর কণা তৈরি করার সাব-ফাংশন
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            document.body.appendChild(particle);

            const size = Math.random() * 6 + 4;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            particle.style.left = `${x - size / 2}px`;
            particle.style.top = `${y - size / 2}px`;

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 80 + 40;
            const mx = Math.cos(angle) * velocity;
            const my = Math.sin(angle) * velocity;

            particle.style.setProperty('--mx', `${mx}px`);
            particle.style.setProperty('--my', `${my}px`);

            setTimeout(() => {
                particle.remove();
            }, 600);
        }

        // পেজ লোড হওয়ার সাথে সাথে শুরুতে শুধু "আজকের প্রোডাক্ট" দেখাবে
        filterProducts('today');
    </script>
</body>
</html>
