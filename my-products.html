<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাই প্রোডাক্টস - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; overflow-x: hidden; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; font-size: 24px; }
        
        /* প্রোডাক্ট আইটেম স্টাইল */
        .product-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #eee; 
            cursor: pointer;
            transition: background 0.3s, transform 0.5s, opacity 0.5s;
            position: relative;
            border-radius: 6px;
        }
        .product-item:hover { background-color: #fcfcfc; }
        .product-item:last-child { border-bottom: none; }
        
        .prod-details h3 { color: #333; font-size: 18px; margin-bottom: 5px; }
        .prod-details p { color: #7f8c8d; font-size: 14px; }
        .status { background: #2ecc71; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; transition: all 0.3s; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }

        /* ডিলিট বাটন স্টাইল (শুরুতে লুকানো থাকবে) */
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: none; /* প্রথমে ইনভিজিবল থাকবে */
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;
        }
        
        /* যখন প্রোডাক্টে ক্লিক করা হবে, তখন এই ক্লাসটি অ্যাক্টিভ হবে */
        .product-item.show-delete .status {
            display: none; /* স্ট্যাটাস লুকিয়ে যাবে */
        }
        .product-item.show-delete .delete-btn {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        /* ডিলিট হওয়ার সময় ফেড আউট অ্যানিমেশন */
        .product-item.fade-out {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        /* আলোর ক্র্যাশ (Particle) স্টাইল */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, #ffea00, #ff5722);
            box-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff5722;
            animation: flash-crash 0.6s ease-out forwards;
            z-index: 9999;
        }

        @keyframes flash-crash {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--mx), var(--my)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 আমার প্রোডাক্টসমূহ (My Products)</h1>
        
        <div class="product-list">
            <div class="product-item" onclick="toggleDelete(this, event)">
                <div class="prod-details">
                    <h3>প্রিমিয়াম টি-শার্ট</h3>
                    <p>অর্ডার আইডি: #AST-9874</p>
                </div>
                <span class="status">ডেলিভারড</span>
                <button class="delete-btn" onclick="deleteProduct(this, event)">ডিলিট করুন</button>
            </div>

            <div class="product-item" onclick="toggleDelete(this, event)">
                <div class="prod-details">
                    <h3>স্মার্ট এনালগ ঘড়ি</h3>
                    <p>অর্ডার আইডি: #AST-9852</p>
                </div>
                <span class="status" style="background: #f1c40f;">চলতি পথে</span>
                <button class="delete-btn" onclick="deleteProduct(this, event)">ডিলিট করুন</button>
            </div>
        </div>

        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

    <script>
        // প্রোডাক্টের ওপর ক্লিক করলে ডিলিট বাটন দেখানোর ফাংশন
        function toggleDelete(element, event) {
            // যদি সরাসরি ডিলিট বাটনে ক্লিক করা হয়, তবে এই ফাংশনটি কাজ করবে না
            if (event.target.classList.contains('delete-btn')) return;

            // আগের কোনো প্রোডাক্টে ডিলিট বাটন খোলা থাকলে তা বন্ধ করে দেবে
            document.querySelectorAll('.product-item').forEach(item => {
                if (item !== element) item.classList.remove('show-delete');
            });

            // বর্তমান প্রোডাক্টে ডিলিট বাটন টগল (আনা/নেওয়া) করবে
            element.classList.toggle('show-delete');
        }

        // আলোর ক্র্যাশ ইফেক্ট এবং ডিলিট করার মেইন লজিক
        function deleteProduct(button, event) {
            event.stopPropagation(); // প্রোডাক্ট ক্লিকের ইভেন্টকে থামানোর জন্য
            
            const productItem = button.closest('.product-item');
            
            // বাটনের পজিশন থেকে আলোর ক্র্যাশের কেন্দ্রবিন্দু ঠিক করা
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // ৩০টি আলোর কণা (Particles) তৈরি করা
            for (let i = 0; i < 30; i++) {
                createParticle(centerX, centerY);
            }

            // প্রোডাক্টটিকে হালকা অ্যানিমেশন দিয়ে স্ক্রিন থেকে মুছে ফেলা
            productItem.classList.add('fade-out');
            
            // অ্যানিমেশন শেষ হওয়ার পর ডক থেকে রিমুভ করা (৫০০ মিলি-সেকেন্ড পর)
            setTimeout(() => {
                productItem.remove();
            }, 500);
        }

        // আলোর কণা তৈরি করার সাব-ফাংশন
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            document.body.appendChild(particle);

            // সাইজ র‍্যান্ডম করা (৪ থেকে ১০ পিক্সেল)
            const size = Math.random() * 6 + 4;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            // আলোর কণাটি স্ক্রিনের ঠিক কোন জায়গা থেকে ছড়াবে
            particle.style.left = `${x - size / 2}px`;
            particle.style.top = `${y - size / 2}px`;

            // কণাগুলো কোন দিকে কতটা ছিটকে যাবে (র‍্যান্ডম ডিরেকশন)
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 80 + 40; // ছিটকে যাওয়ার গতি
            const mx = Math.cos(angle) * velocity;
            const my = Math.sin(angle) * velocity;

            // সিএসএস ভ্যারিয়েবলে মানগুলো পাস করা
            particle.style.setProperty('--mx', `${mx}px`);
            particle.style.setProperty('--my', `${my}px`);

            // অ্যানিমেশন শেষে কণাগুলো ডিলিট করে দেওয়া যেন মেমোরি জ্যাম না হয়
            setTimeout(() => {
                particle.remove();
            }, 600);
        }
    </script>
</body>
</html>
