<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Products - Aesthetic Shop</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        body { background-color: #090d16; padding: 30px 20px; overflow-x: hidden; color: #f8fafc; }
        
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: #111827; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #1f2937;
            position: relative; 
        }
        
        /* 🎯 প্রিমিয়াম ভিজ্যুয়াল ইফেক্ট ও বর্ডারসহ নতুন হেডিং স্টাইল */
        .premium-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 auto 40px auto;
            padding: 15px 25px;
            max-width: fit-content;
            
            /* গ্লাস ও ব্যাকগ্রাউন্ড ইফেক্ট */
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            /* রাউন্ডেড এবং প্রিমিয়াম গ্রাডিয়েন্ট বর্ডার */
            border: 2px solid transparent;
            border-image: linear-gradient(45deg, #2563eb, #10b981, #3b82f6) 1;
            border-radius: 12px; /* নোট: গ্রাডিয়েন্ট বর্ডার এর সাথে মাস্কিং ছাড়া সাধারণ রেডিয়াস ট্রিক */
            position: relative;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15), inset 0 0 12px rgba(255,255,255,0.05);
        }

        /* পারফেক্ট রাউন্ডেড কর্নার সহ গ্রাডিয়েন্ট বর্ডার ফিক্স */
        .premium-header {
            border-radius: 14px;
            border: 2px solid transparent;
            background: linear-gradient(#111827, #111827) padding-box,
                        linear-gradient(45deg, #2563eb, #10b981) border-box;
        }
        
        .premium-header h1 { 
            font-size: 26px; 
            font-weight: 800; 
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            
            /* টেক্সট গ্রাডিয়েন্ট কালার ইফেক্ট */
            background: linear-gradient(135deg, #ffffff 30%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
        }
        
        .premium-header .icon {
            font-size: 28px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* প্রোডাক্ট গ্রিড লেআউট */
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            min-height: 250px;
        }

        /* প্রোডাক্ট কার্ড প্রিমিয়াম স্টাইল */
        .product-card { 
            background: #1f2937; 
            border: 1px solid #374151;
            padding: 20px; 
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card h3 { color: #ffffff; font-size: 19px; margin: 12px 0 6px 0; font-weight: 600; }
        .product-card p { color: #9ca3af; font-size: 14px; margin-bottom: 12px; }
        .product-card .price { color: #10b981; font-weight: 700; font-size: 16px; }
        .product-card .old-price { color: #6b7280; text-decoration: line-through; margin-right: 8px; font-size: 14px; }

        .order-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .order-btn:hover { background: #1d4ed8; }

        /* ব্যাক বাটন */
        .back-btn { 
            display: inline-block; 
            margin-top: 25px; 
            text-decoration: none; 
            color: #2563eb; 
            font-weight: 600; 
            font-size: 15px;
            transition: color 0.2s; 
        }
        .back-btn:hover { color: #60a5fa; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🌟 গ্রাডিয়েন্ট বর্ডার ও নিওন ইফেক্টযুক্ত প্রিমিয়াম হেডিং বক্স -->
        <div class="premium-header">
            <span class="icon">📦</span>
            <h1>Today's Products</h1>
        </div>
        
        <!-- আপনার script.js এই গ্রিডেই প্রোডাক্ট অথবা নো প্রোডাক্ট প্রিমিয়াম ইফেক্ট লোড করবে -->
        <div class="product-list" id="productGrid"></div>

        <a href="index.html" class="back-btn">← Back to Shop</a>
    </div>

    <!-- মেইন লজিক ফাইল কানেকশন -->
    <script src="script.js"></script>
</body>
</html>
