<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>যোগাযোগ করুন - Astic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="contact-container">
        <h2>আমাদের সাথে যোগাযোগ করুন</h2>
        <p>আপনার কোনো প্রশ্ন থাকলে বা কোনো প্রয়োজনে আমাদের সাথে যোগাযোগ করতে পারেন।</p>
        
        <div class="contact-info">
            <p><strong>ইমেইল:</strong> neloyk312@gmail.com</p>
            
            <p><strong>ফোন:</strong> 01315531124</p>
        </div>

        <form class="contact-form">
            <label for="name">নাম:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">ইমেইল:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">বার্তা:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">বার্তা পাঠান</button>
        </form>
    </main>

</body>
</html>
