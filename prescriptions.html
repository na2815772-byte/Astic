<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রেসক্রিপশন আপলোড - এস্টিক</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fc; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 15px; font-size: 24px; }
        p { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .upload-box { border: 2px dashed #3498db; padding: 30px; border-radius: 6px; background: #f8fafc; cursor: pointer; margin-bottom: 20px; }
        .upload-box:hover { background: #f0f4f8; }
        .upload-icon { font-size: 40px; color: #3498db; margin-bottom: 10px; }
        .btn { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        .btn:hover { background: #27ae60; }
        .back-btn { display: inline-block; margin-top: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📄 প্রেসক্রিপশন আপলোড করুন</h1>
        <p>আপনার প্রেসক্রিপশনের স্পষ্ট ছবি আপলোড করুন, আমাদের প্রতিনিধি দেখে ঔষধ সিলেক্ট করে দেবে।</p>
        
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📤</div>
            <p>এখানে ক্লিক করে ছবি সিলেক্ট করুন</p>
            <input type="file" id="fileInput" style="display:none;" accept="image/*">
        </div>

        <button class="btn" onclick="alert('প্রেসক্রিপশনটি সফলভাবে আপলোড হয়েছে!')">সাবমিট করুন</button>

        <br>
        <a href="index.html" class="back-btn">← মূল শপ-এ ফিরে যান</a>
    </div>

</body>
</html>
